<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Vegas Wolf</title>
<style>
  :root{
    --bg:#0d2c1a;--bg2:#163b24;--gold:#d4a843;--gold2:#f0c865;--text:#efe7d6;--muted:#a9b6ac;
    --card:rgba(255,255,255,0.06);--border:rgba(212,168,67,0.18);--green:#5ec288;--red:#f07c7c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:
    radial-gradient(circle at top left, rgba(212,168,67,.08), transparent 30%),
    radial-gradient(circle at bottom right, rgba(94,194,136,.08), transparent 25%),
    var(--bg);
    color:var(--text)}
  .app{max-width:860px;margin:0 auto;min-height:100vh;padding:16px 14px 40px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
  h1,h2,h3{margin:0}
  .brand{font-size:28px;font-weight:800;letter-spacing:.5px;color:var(--gold)}
  .muted{color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;backdrop-filter: blur(8px);margin-bottom:14px}
  .grid{display:grid;gap:12px}
  .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);display:block;margin-bottom:6px}
  input,select,button{font:inherit}
  input,select{width:100%;padding:12px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:var(--text)}
  input::placeholder{color:#b7c3ba}
  button{border:none;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer}
  .btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#12311e}
  .btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.12)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.12)}
  .btn.red{background:#7f1d1d;color:#fff}
  .pill{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px}
  .sectionTitle{font-size:18px;font-weight:800;margin-bottom:12px}
  .setupPlayers .playerRow{display:grid;grid-template-columns:56px 1fr;gap:10px;align-items:center;margin-bottom:10px}
  .tableWrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
  .summary-table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  .summary-table.compact{min-width:560px;font-size:12px}
  .summary-table th,.summary-table td{border:1px solid rgba(255,255,255,.12);padding:8px;text-align:center;vertical-align:middle}
  .summary-table th{background:rgba(212,168,67,.12);color:var(--gold)}
  .summary-table td.left{text-align:left}
  .money-pos{color:var(--green);font-weight:700}
  .money-neg{color:var(--red);font-weight:700}
  .totalsList{display:grid;gap:8px}
  .totalsRow{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.05)}
  .matchup{font-size:15px;font-weight:700}
  .tiny{font-size:12px}
  .holeNav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
  .holeBadge{font-size:22px;font-weight:800;color:var(--gold)}
  .footerActions{display:flex;gap:10px;flex-wrap:wrap}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;padding:14px;z-index:10}
  .modalContent{width:min(860px,100%);max-height:88vh;overflow:auto;background:#143321;border:1px solid var(--border);border-radius:18px;padding:16px}
  .empty{padding:24px 10px;text-align:center;color:var(--muted)}
  .scoreInput,.moneyInput{font-size:22px;text-align:center;font-weight:800;letter-spacing:1px}
  .scoreInput.pending{color:var(--red)}
  .scoreInput.ready{color:var(--green)}
  .moneyInput{font-size:18px;text-align:left}
  .note{font-size:13px;color:var(--muted);line-height:1.45}
  @media (max-width:700px){
    .app{padding:12px 10px 28px}
    .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
    .topbar{align-items:flex-start;flex-direction:column}
    .card{padding:12px}
    .summary-table{font-size:12px;min-width:540px}
    .summary-table.compact{min-width:480px;font-size:11px}
    .summary-table th,.summary-table td{padding:6px}
    .moneyInput{font-size:16px}
    .scoreInput{font-size:20px}
  }
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const STORAGE_KEY = "vegas-wolf-state-v20260405a";

function createInitialState(){
  return {
    phase:"setup",
    showSummary:false,
    players:[],
    playerCount:4,
    order:[0,1,2,3],
    currentHole:1,
    totalHoles:18,
    roundStakeDefault:1,
    junkDefault:2,
    holeHistory:[],
    wolfAssignments:{},
    tempResult:null
  };
}
let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return createInitialState();
    const parsed = JSON.parse(raw);
    return Object.assign(createInitialState(), parsed);
  }catch(e){ return createInitialState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function money(n){
  const s = n < 0 ? "-" : "";
  return s + "$" + Math.abs(n).toFixed(2);
}
function moneyValue(v){
  const n = parseFloat(v);
  return Number.isFinite(n) ? n.toFixed(2) : "0.00";
}
function moneyFieldValue(v){
  return '$' + moneyValue(v);
}
function esc(str){ return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function getPlayerName(i){ return state.players[i] || ("Player " + (i+1)); }
function defaultWolfForHole(hole){
  const order = state.order || [];
  if(!order.length) return 0;
  return order[(hole - 1) % order.length];
}
function wolfForHole(hole){
  return state.wolfAssignments[String(hole)] ?? defaultWolfForHole(hole);
}
function formatTeam(team){ return team.map(getPlayerName).join(" / " ); }
function formatTeamPlus(team){ return team.map(getPlayerName).join(" + " ); }
function computeTeamLists(wolfIdx, partnerIdx){
  const wolfTeam = [wolfIdx, partnerIdx];
  const otherTeam = [];
  for(let i=0;i<state.playerCount;i++) if(i!==wolfIdx && i!==partnerIdx) otherTeam.push(i);
  return {wolfTeam, otherTeam};
}
function parseScore(s){
  const n = parseInt(String(s).replace(/\D/g,""),10);
  return Number.isFinite(n) ? n : null;
}
function parseMoney(s){
  const n = parseFloat(String(s).replace(/[^0-9.\-]/g,""));
  return Number.isFinite(n) ? n : null;
}
function validateHoleInput(data){
  const a = parseScore(data.wolfScore);
  const b = parseScore(data.otherScore);
  if(data.partnerIdx===null || data.partnerIdx===undefined || data.partnerIdx==="") return "Select the Wolf's partner.";
  if(a===null || String(a).length < 2) return "Enter the Wolf team score, like 44 or 45.";
  if(b===null || String(b).length < 2) return "Enter the other team score, like 47 or 65.";
  if(!(parseFloat(data.stake) > 0)) return "Stake for hole must be greater than zero.";
  if(!(parseFloat(data.junk) >= 0)) return "Junk amount must be zero or greater.";
  return null;
}
function calculateDeltas(entry){
  const wolfTeam = [...entry.wolfTeam];
  const otherTeam = [...entry.otherTeam];
  const n = state.playerCount;
  const diff = Math.abs(entry.wolfScore - entry.otherScore);
  const wolfWon = entry.wolfScore < entry.otherScore;
  const winningTeam = wolfWon ? wolfTeam : otherTeam;
  const losingTeam = wolfWon ? otherTeam : wolfTeam;
  const deltas = new Array(n).fill(0);

  if(diff > 0){
    if(n === 4){
      const eachWinner = diff * entry.stake * losingTeam.length; // 20-point gap -> each winner +40
      const eachLoser = -diff * entry.stake * winningTeam.length;
      winningTeam.forEach(i => deltas[i] += eachWinner);
      losingTeam.forEach(i => deltas[i] += eachLoser);
    }else{
      const totalPot = diff * entry.stake * winningTeam.length; // 2-man win => total 40, 3-man win => total 60 on 20-point gap
      const eachWinner = totalPot / winningTeam.length;
      const eachLoser = -totalPot / losingTeam.length;
      winningTeam.forEach(i => deltas[i] += eachWinner);
      losingTeam.forEach(i => deltas[i] += eachLoser);
    }
  }

  const junkCounts = entry.junkCounts || new Array(n).fill(0);
  const totalJunks = junkCounts.reduce((a,b)=>a+b,0);
  if(entry.junk > 0 && totalJunks > 0){
    for(let i=0;i<n;i++){
      deltas[i] += entry.junk * (junkCounts[i] * (n - 1) - (totalJunks - junkCounts[i]));
    }
  }

  return { deltas, diff, winningTeam, losingTeam, junkCounts };
}
function totalsThrough(endHole){
  const totals = new Array(state.playerCount).fill(0);
  state.holeHistory.filter(h => h.hole <= endHole).forEach(h => {
    h.deltas.forEach((d,i)=> totals[i] += d);
  });
  return totals;
}
function totalsBetween(startHole, endHole){
  const totals = new Array(state.playerCount).fill(0);
  state.holeHistory.filter(h => h.hole >= startHole && h.hole <= endHole).forEach(h => {
    h.deltas.forEach((d,i)=> totals[i] += d);
  });
  return totals;
}

function holeEntries(start,end){
  return state.holeHistory.filter(h=>h.hole>=start && h.hole<=end).sort((a,b)=>a.hole-b.hole);
}
function scorePlaceholder(v){
  const digits = String(v||'').replace(/\D/g,'');
  return digits.length >= 2 ? digits : 'XX';
}
function scoreStateClass(v){
  const digits = String(v||'').replace(/\D/g,'');
  return digits.length >= 2 ? 'ready' : 'pending';
}
function bindMoneyInputs(root){
  root.querySelectorAll('input[data-money]').forEach(inp => {
    inp.addEventListener('focus', () => {
      const raw = inp.value.replace(/[^0-9.]/g,'');
      inp.value = raw || '';
    });
    inp.addEventListener('blur', () => {
      inp.value = moneyFieldValue(inp.value || inp.dataset.defaultValue || 0);
    });
  });
}
function bindScoreInputs(root){
  root.querySelectorAll('input[data-score]').forEach(inp => {
    const paint = () => {
      inp.value = scorePlaceholder(inp.value);
      inp.classList.remove('pending','ready');
      inp.classList.add(scoreStateClass(inp.value));
    };
    inp.addEventListener('focus', () => {
      const digits = inp.value.replace(/\D/g,'');
      inp.value = digits;
    });
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/\D/g,'').slice(0,2);
      inp.classList.remove('pending','ready');
      inp.classList.add(scoreStateClass(inp.value));
    });
    inp.addEventListener('blur', paint);
    paint();
  });
}
function setupSubmit(ev){
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const count = parseInt(fd.get("playerCount"),10);
  const players = [];
  for(let i=0;i<count;i++) players.push(String(fd.get("player"+i) || "").trim());
  if(players.some(p => !p)){ alert("Please enter all player names."); return; }
  state = {
    phase:"hole",
    showSummary:false,
    players,
    playerCount:count,
    order:players.map((_,i)=>i),
    currentHole:1,
    totalHoles:parseInt(fd.get("holes"),10),
    roundStakeDefault:parseMoney(fd.get("defaultStake")),
    junkDefault:parseMoney(fd.get("defaultJunk")),
    holeHistory:[],
    wolfAssignments:{},
    tempResult:null
  };
  saveState(); render();
}
function resetRound(){
  if(!confirm("Are you sure you want to delete/reset this round and start over?")) return;
  state = createInitialState();
  saveState(); render();
}
function submitHole(ev){
  ev.preventDefault();
  const isEditing = state.phase === "edit";
  const fd = new FormData(ev.target);
  const hole = isEditing ? state.editingHole : state.currentHole;
  const wolfIdx = parseInt(fd.get("wolfIdx"),10);
  const partnerIdx = parseInt(fd.get("partnerIdx"),10);
  const data = {
    hole,
    wolfIdx,
    partnerIdx,
    wolfScore: parseScore(fd.get("wolfScore")),
    otherScore: parseScore(fd.get("otherScore")),
    stake: parseMoney(fd.get("stake")),
    junk: parseMoney(fd.get("junk"))
  };
  const err = validateHoleInput(Object.assign({}, data, {wolfScore:fd.get("wolfScore"), otherScore:fd.get("otherScore")}));
  if(err){ alert(err); return; }
  const teams = computeTeamLists(wolfIdx, partnerIdx);
  const junkCounts = [];
  for(let i=0;i<state.playerCount;i++) junkCounts.push(Math.max(0, parseInt(fd.get("junkCount"+i) || "0",10) || 0));
  const entry = Object.assign({}, data, teams, {junkCounts});
  const scoring = calculateDeltas(entry);
  entry.deltas = scoring.deltas;
  entry.diff = scoring.diff;
  entry.winningTeam = scoring.winningTeam;
  entry.losingTeam = scoring.losingTeam;
  state.holeHistory = state.holeHistory.filter(h => h.hole !== hole);
  state.holeHistory.push(entry);
  state.holeHistory.sort((a,b)=>a.hole-b.hole);
  state.wolfAssignments[String(hole)] = wolfIdx;
  state.tempResult = entry;
  if(isEditing){
    state.phase = "hole";
  }else if(hole === state.totalHoles){
    state.phase = "final";
  }else if(hole === 9 && state.totalHoles === 18){
    state.phase = "front9";
  }else{
    state.currentHole = hole + 1;
    state.phase = "result";
  }
  saveState(); render();
}
function nextAfterResult(){
  state.phase = "hole";
  saveState(); render();
}
function openSummary(){ state.showSummary = true; render(); }
function closeSummary(){ state.showSummary = false; render(); }

function renderSetup(){
  const count = state.playerCount || 4;
  let playerInputs = "";
  for(let i=0;i<count;i++){
    playerInputs += `<div class="playerRow"><div class="pill">P${i+1}</div><input name="player${i}" placeholder="Player ${i+1} name" value="${esc(state.players[i]||"")}"></div>`;
  }
  return `
  <div class="topbar">
    <div><div class="brand">🐺 Vegas Wolf</div><div class="muted">GitHub Pages ready · mobile friendly</div></div>
  </div>
  <form class="card" id="setupForm">
    <div class="sectionTitle">Start Round</div>
    <div class="grid grid-4">
      <div><label>Players</label>
        <select name="playerCount" id="playerCountSel">
          <option value="4" ${count===4?"selected":""}>4 Players</option>
          <option value="5" ${count===5?"selected":""}>5 Players</option>
        </select>
      </div>
      <div><label>Holes</label>
        <select name="holes"><option value="9" ${state.totalHoles===9?"selected":""}>9</option><option value="18" ${state.totalHoles===18?"selected":""}>18</option></select>
      </div>
      <div><label>Default Stake / Hole</label><input class="moneyInput" data-money="1" type="text" inputmode="decimal" name="defaultStake" value="${moneyFieldValue(state.roundStakeDefault||1)}"></div>
      <div><label>Default Junk</label><input class="moneyInput" data-money="1" type="text" inputmode="decimal" name="defaultJunk" value="${moneyFieldValue(state.junkDefault??2)}"></div>
    </div>
    <div style="height:14px"></div>
    <div class="sectionTitle">Players</div>
    <div class="setupPlayers">${playerInputs}</div>
    <div class="footerActions"><button class="btn" type="submit">Start Round</button></div>
  </form>
  <div class="card note">
    <strong>Scoring notes.</strong> In 4-player mode, a 20-point gap pays each winner <strong>20 × stake × 2</strong>. In 5-player mode, the total team pot equals <strong>gap × stake × winning-team-size</strong>, split across winners and losers so every hole nets to zero. Junks are entered per player as a count, and each junk pays from every other player.
  </div>`;
}
function buildHoleForm(existing){
  const hole = existing ? existing.hole : state.currentHole;
  const wolfIdx = existing ? existing.wolfIdx : wolfForHole(hole);
  const partnerIdx = existing ? existing.partnerIdx : null;
  const otherOptions = [];
  for(let i=0;i<state.playerCount;i++){
    if(i!==wolfIdx) otherOptions.push(`<option value="${i}" ${partnerIdx===i?"selected":""}>${esc(getPlayerName(i))}</option>`);
  }
  let junkInputs = "";
  const junkCounts = existing ? existing.junkCounts : new Array(state.playerCount).fill(0);
  for(let i=0;i<state.playerCount;i++){
    junkInputs += `<div><label>${esc(getPlayerName(i))} # of Junks</label><input type="number" min="0" step="1" name="junkCount${i}" value="${junkCounts[i]||0}"></div>`;
  }
  const teams = partnerIdx!==null ? computeTeamLists(wolfIdx, partnerIdx) : null;
  const preview = teams ? `<div class="card">
      <div class="matchup">${esc(formatTeam(teams.wolfTeam))} vs ${esc(formatTeam(teams.otherTeam))}</div>
      <div class="tiny muted">Enter the team scores only. Example: 45 vs 65.</div>
    </div>` : "";
  return `
  <div class="topbar">
    <div><div class="brand">🐺 Vegas Wolf</div><div class="muted">Hole ${hole} of ${state.totalHoles}</div></div>
    <div class="footerActions">
      ${state.holeHistory.length ? `<button class="btn secondary" onclick="openSummary()" type="button">Hole-by-Hole Summary</button>` : ``}
      <button class="btn ghost" onclick="resetRound()" type="button">Reset Round</button>
    </div>
  </div>
  <form class="card" id="holeForm">
    <div class="holeNav">
      <div class="holeBadge">Hole ${hole}</div>
      <div class="pill">Wolf: ${esc(getPlayerName(wolfIdx))}</div>
    </div>
    <div class="grid grid-3">
      <div>
        <label>Wolf for this hole</label>
        <select name="wolfIdx" id="wolfSel">
          ${state.players.map((p,i)=>`<option value="${i}" ${i===wolfIdx?"selected":""}>${esc(p)}</option>`).join("")}
        </select>
      </div>
      <div>
        <label>Wolf's partner</label>
        <select name="partnerIdx" id="partnerSel">
          <option value="">Select partner</option>
          ${otherOptions.join("")}
        </select>
      </div>
      <div class="note">Use <strong>Adjust Order</strong> by changing the Wolf for this hole. The summary will preserve that hole's Wolf assignment.</div>
    </div>
    <div style="height:10px"></div>
    ${preview}
    <div class="grid grid-4">
      <div><label>Stake for Hole</label><input class="moneyInput" data-money="1" type="text" inputmode="decimal" name="stake" value="${moneyFieldValue(existing?existing.stake:state.roundStakeDefault)}"></div>
      <div><label>Junk Amount</label><input class="moneyInput" data-money="1" type="text" inputmode="decimal" name="junk" value="${moneyFieldValue(existing?existing.junk:state.junkDefault)}"></div>
      <div><label>${teams ? `Wolf Group: ${esc(formatTeamPlus(teams.wolfTeam))} Score` : "Wolf Group Score"}</label><input class="scoreInput ${scoreStateClass(existing?existing.wolfScore:"")}" data-score="1" type="text" inputmode="numeric" name="wolfScore" value="${scorePlaceholder(existing?existing.wolfScore:"")}" placeholder="XX"></div>
      <div><label>${teams ? `Non-Wolf: ${esc(formatTeamPlus(teams.otherTeam))} Score` : "Non-Wolf Score"}</label><input class="scoreInput ${scoreStateClass(existing?existing.otherScore:"")}" data-score="1" type="text" inputmode="numeric" name="otherScore" value="${scorePlaceholder(existing?existing.otherScore:"")}" placeholder="XX"></div>
    </div>
    <div style="height:12px"></div>
    <div class="sectionTitle">Junks (Greenie, Sandie, Birdie)</div>
    <div class="grid grid-${Math.min(state.playerCount,4)}">${junkInputs}</div>
    <div style="height:14px"></div>
    <div class="footerActions">
      <button class="btn" type="submit">${existing ? "Save Hole" : "Score Hole"}</button>
      ${existing ? `<button class="btn secondary" type="button" onclick="openSummary(); state.phase='hole'; saveState(); render();" >Back to Summary</button>` : ``}
    </div>
  </form>`;
}
function renderResult(){
  const r = state.tempResult;
  if(!r) { state.phase = "hole"; saveState(); return renderHole(); }
  const nextLabel = (r.hole===9 && state.totalHoles===18) ? "View Front 9 Summary" : "Next Hole";
  return `
  <div class="topbar">
    <div><div class="brand">🐺 Vegas Wolf</div><div class="muted">Hole ${r.hole} scored</div></div>
    <div class="footerActions">
      <button class="btn secondary" onclick="openSummary()" type="button">Hole-by-Hole Summary</button>
      <button class="btn ghost" onclick="resetRound()" type="button">Reset Round</button>
    </div>
  </div>
  <div class="card">
    <div class="sectionTitle">${esc(formatTeam(r.winningTeam))} wins</div>
    <div class="note">${esc(formatTeam(r.wolfTeam))} scored <strong>${r.wolfScore}</strong> vs ${esc(formatTeam(r.otherTeam))} at <strong>${r.otherScore}</strong>. Gap: <strong>${r.diff}</strong>.</div>
    <div style="height:12px"></div>
    <div class="tableWrap"><table class="summary-table compact">
      <thead><tr><th>Player</th><th>Hole Delta</th></tr></thead>
      <tbody>
        ${state.players.map((p,i)=>`<tr><td class="left">${esc(p)}</td><td class="${r.deltas[i]>=0?'money-pos':'money-neg'}">${money(r.deltas[i])}</td></tr>`).join("")}
      </tbody>
    </table></div>
  </div>
  ${renderTotalsCard(totalsThrough(r.hole), "Running Gambling Totals")}
  <div class="footerActions"><button class="btn" onclick="nextAfterResult()" type="button">${nextLabel}</button></div>`;
}
function renderTotalsCard(totals, title){
  const order = [...Array(state.playerCount).keys()].sort((a,b)=>totals[b]-totals[a]);
  return `<div class="card"><div class="sectionTitle">${esc(title)}</div><div class="totalsList">
    ${order.map(i=>`<div class="totalsRow"><div>${esc(getPlayerName(i))}</div><div class="${totals[i]>=0?'money-pos':'money-neg'}">${money(totals[i])}</div></div>`).join("")}
  </div></div>`;
}
function renderHole(){ return buildHoleForm(null); }

function moneyByHoleRows(start,end){
  const holes = holeEntries(start,end);
  if(!holes.length) return `<tr><td colspan="${state.playerCount + 2}" class="empty">No holes scored yet.</td></tr>`;
  return holes.map(h => `
    <tr>
      <td>${h.hole}</td>
      ${state.players.map((p,i)=>`<td class="${h.deltas[i]>=0?'money-pos':'money-neg'}">${money(h.deltas[i])}</td>`).join('')}
      <td class="${h.deltas.reduce((a,b)=>a+b,0)===0?'money-pos':'money-neg'}">${money(h.deltas.reduce((a,b)=>a+b,0))}</td>
    </tr>`).join('') + `
    <tr>
      <th>Total</th>
      ${totalsBetween(start,end).map(t=>`<th class="${t>=0?'money-pos':'money-neg'}">${money(t)}</th>`).join('')}
      <th>${money(totalsBetween(start,end).reduce((a,b)=>a+b,0))}</th>
    </tr>`;
}
function matchupRows(start,end){
  const holes = holeEntries(start,end);
  if(!holes.length) return `<tr><td colspan="7" class="empty">No holes scored yet.</td></tr>`;
  return holes.map(h => {
    const winnerScore = h.wolfScore < h.otherScore ? h.wolfScore : h.otherScore;
    const loserScore = h.wolfScore < h.otherScore ? h.otherScore : h.wolfScore;
    return `
      <tr>
        <td>${h.hole}</td>
        <td class="left">${esc(formatTeam(h.winningTeam))}</td>
        <td>${winnerScore}</td>
        <td class="left">${esc(formatTeam(h.losingTeam))}</td>
        <td>${loserScore}</td>
        <td>${winnerScore} to ${loserScore}</td>
        <td>${h.diff}</td>
      </tr>`;
  }).join('');
}
function renderScoreSummarySection(start,end,title){
  return `<div class="card">
    <div class="sectionTitle">${esc(title)} · Player Win/Loss by Hole</div>
    <div class="tableWrap"><table class="summary-table compact">
      <thead><tr><th>Hole</th>${state.players.map(p=>`<th>${esc(p)}</th>`).join('')}<th>Net</th></tr></thead>
      <tbody>${moneyByHoleRows(start,end)}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="sectionTitle">${esc(title)} · Winning vs Losing Team</div>
    <div class="tableWrap"><table class="summary-table compact">
      <thead><tr><th>Hole</th><th>Winners</th><th>Winning Team Score</th><th>Losers</th><th>Losing Team Score</th><th>Math</th><th>Total</th></tr></thead>
      <tbody>${matchupRows(start,end)}</tbody>
    </table></div>
  </div>`;
}
function renderFront9(){
  const totals9 = totalsThrough(9);
  return `
    <div class="topbar">
      <div><div class="brand">🐺 Vegas Wolf</div><div class="muted">Front 9 Complete</div></div>
      <div class="footerActions">
        <button class="btn secondary" onclick="openSummary()" type="button">Hole-by-Hole Summary</button>
        <button class="btn ghost" onclick="resetRound()" type="button">Reset Round</button>
      </div>
    </div>
    ${renderScoreSummarySection(1,9,"Front 9")}
    ${renderTotalsCard(totals9, "Gambling Through 9")}
    <div class="footerActions"><button class="btn" type="button" onclick="state.currentHole=10; state.phase='hole'; saveState(); render();">Continue to Hole 10</button></div>`;
}
function renderFinal(){
  const totals18 = totalsThrough(state.totalHoles);
  const front = totalsBetween(1, Math.min(9,state.totalHoles));
  const back = state.totalHoles > 9 ? totalsBetween(10, state.totalHoles) : null;
  return `
    <div class="topbar">
      <div><div class="brand">🏆 Final Scorecard</div><div class="muted">${state.totalHoles} Holes Complete</div></div>
      <div class="footerActions">
        <button class="btn secondary" onclick="openSummary()" type="button">Hole-by-Hole Summary</button>
        <button class="btn ghost" onclick="resetRound()" type="button">New Round</button>
      </div>
    </div>
    ${renderScoreSummarySection(1, Math.min(9,state.totalHoles), state.totalHoles > 9 ? "Front 9" : "Scorecard")}
    ${state.totalHoles > 9 ? renderScoreSummarySection(10,18,"Back 9") : ""}
    ${renderTotalsCard(front, state.totalHoles > 9 ? "Gambling - Front 9" : "Gambling Totals")}
    ${back ? renderTotalsCard(back, "Gambling - Back 9") : ""}
    ${renderTotalsCard(totals18, "Gambling - Total")}
  `;
}
function renderSummaryModal(){
  if(!state.showSummary) return "";
  return `<div class="modal" onclick="if(event.target===this) closeSummary()">
    <div class="modalContent">
      <div class="topbar">
        <div><div class="sectionTitle">Hole-by-Hole Summary</div><div class="muted">Through hole ${state.holeHistory.length ? state.holeHistory[state.holeHistory.length-1].hole : 0}</div></div>
        <div class="footerActions">
          <button class="btn ghost" type="button" onclick="closeSummary()">Close</button>
        </div>
      </div>
      ${renderScoreSummarySection(1, Math.min(9,state.totalHoles), state.totalHoles > 9 ? "Front 9" : "Scorecard")}
      ${state.totalHoles > 9 ? renderScoreSummarySection(10,18,"Back 9") : ""}
      ${renderTotalsCard(totalsThrough(state.holeHistory.length ? state.holeHistory[state.holeHistory.length-1].hole : 0), "Gambling Totals To Date")}
      ${state.holeHistory.length ? `<div class="card"><div class="sectionTitle">Edit Hole</div><div class="grid grid-4">
        ${state.holeHistory.map(h=>`<button class="btn secondary" type="button" onclick="editHole(${h.hole})">Hole ${h.hole}</button>`).join("")}
      </div></div>` : ""}
    </div>
  </div>`;
}
function editHole(hole){
  state.phase = "edit";
  state.editingHole = hole;
  state.showSummary = false;
  saveState(); render();
}
function renderEdit(){
  const existing = state.holeHistory.find(h=>h.hole===state.editingHole);
  if(!existing){ state.phase='hole'; saveState(); return renderHole(); }
  return buildHoleForm(existing);
}
function attachHandlers(){
  bindMoneyInputs(document);
  bindScoreInputs(document);
  const setup = document.getElementById("setupForm");
  if(setup){
    setup.addEventListener("submit", setupSubmit);
    const sel = document.getElementById("playerCountSel");
    sel.addEventListener("change", e => {
      state.playerCount = parseInt(e.target.value,10);
      if(!state.players || state.players.length !== state.playerCount){
        const next = [];
        for(let i=0;i<state.playerCount;i++) next.push(state.players[i] || "");
        state.players = next;
      }
      render();
    });
  }
  const holeForm = document.getElementById("holeForm");
  if(holeForm){
    holeForm.addEventListener("submit", submitHole);
    const wolfSel = document.getElementById("wolfSel");
    if(wolfSel){
      wolfSel.addEventListener("change", () => {
        const hole = state.phase === "edit" ? state.editingHole : state.currentHole;
        state.wolfAssignments[String(hole)] = parseInt(wolfSel.value,10);
        saveState(); render();
      });
    }
    const partnerSel = document.getElementById("partnerSel");
    if(partnerSel){
      partnerSel.addEventListener("change", () => render());
    }
  }
}
function render(){
  const app = document.getElementById("app");
  let body = "";
  if(state.phase === "setup") body = renderSetup();
  else if(state.phase === "hole") body = renderHole();
  else if(state.phase === "result") body = renderResult();
  else if(state.phase === "front9") body = renderFront9();
  else if(state.phase === "final") body = renderFinal();
  else if(state.phase === "edit") body = renderEdit();
  app.innerHTML = body + renderSummaryModal();
  attachHandlers();
}
window.openSummary = openSummary;
window.closeSummary = closeSummary;
window.resetRound = resetRound;
window.nextAfterResult = nextAfterResult;
window.editHole = editHole;
render();
</script>
</body>
</html>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = 'vegas-wolf-shareable-v2';
const DEFAULT_PLAYERS = ['', '', '', ''];
const EMPTY_BIRDIES = count => Array(count).fill(false);
const EMPTY_TOTALS = count => Array(count).fill(0);

function clampPositiveInt(value, fallback = '') {
  if (value === '') return '';
  const parsed = parseInt(value, 10);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
}

function vegasScoreFromPair(a, b) {
  const lo = Math.min(a, b);
  const hi = Math.max(a, b);
  return lo * 10 + hi;
}

function formatVegas(n) {
  return `${Math.floor(n / 10)}${n % 10}`;
}

function flipVegas(n) {
  const lo = Math.floor(n / 10);
  const hi = n % 10;
  return hi * 10 + lo;
}

function getOpposingIndices(playerCount, wolfIdx, partnerIdx) {
  return [...Array(playerCount).keys()].filter(i => i !== wolfIdx && i !== partnerIdx);
}

function getTeamComposite(scoreIndices, scores) {
  const ordered = scoreIndices
    .map(i => ({ idx: i, score: scores[i] }))
    .sort((a, b) => a.score - b.score || a.idx - b.idx);

  if (ordered.length === 2) {
    return {
      value: vegasScoreFromPair(ordered[0].score, ordered[1].score),
      countedIndices: ordered.map(x => x.idx),
      ignoredIndices: [],
      label: `${ordered[0].score}/${ordered[1].score}`,
    };
  }

  const low = ordered[0];
  const high = ordered[ordered.length - 1];
  return {
    value: vegasScoreFromPair(low.score, high.score),
    countedIndices: [low.idx, high.idx],
    ignoredIndices: ordered.slice(1, -1).map(x => x.idx),
    label: `${low.score}/${high.score}`,
  };
}

function calculateHoleResult({ scores, wolfIdx, partnerIdx, isLoneWolf, stake, birdies, playerCount, junkValue = 0, greenieIdx = null, putt3Idx = null, sandyIdx = null }) {
  const hasBirdie = (birdies || []).some(Boolean);
  const delta = Array(playerCount).fill(0);
  const normalizedJunk = Number.isFinite(junkValue) ? junkValue : 0;

  function applyWinnerFromOthers(winnerIdx, amount) {
    if (winnerIdx == null || amount <= 0) return;
    [...Array(playerCount).keys()].forEach(i => {
      if (i === winnerIdx) return;
      delta[winnerIdx] += amount;
      delta[i] -= amount;
    });
  }

  function applyLoserToOthers(loserIdx, amount) {
    if (loserIdx == null || amount <= 0) return;
    [...Array(playerCount).keys()].forEach(i => {
      if (i === loserIdx) return;
      delta[loserIdx] -= amount;
      delta[i] += amount;
    });
  }

  let baseWinner = 'tie';
  let wolfTeamVegas = null;
  let otherTeamVegas = null;
  let flippedTeam = null;
  let birdieFlipped = false;
  let points = 0;
  let wolfTeamIndices = [wolfIdx];
  let opponentTeamIndices = getOpposingIndices(playerCount, wolfIdx, null);
  let counted = { wolf: [wolfIdx], other: [] };
  let ignored = { wolf: [], other: [] };

  if (isLoneWolf) {
    let wolfNet = 0;
    opponentTeamIndices.forEach(oppIdx => {
      const diff = scores[oppIdx] - scores[wolfIdx];
      let pts = diff * stake * 2;
      if (hasBirdie && (birdies[wolfIdx] || birdies[oppIdx])) pts *= 2;
      wolfNet += pts;
      delta[oppIdx] -= pts;
    });
    delta[wolfIdx] = wolfNet;
    baseWinner = wolfNet > 0 ? 'wolf' : wolfNet < 0 ? 'other' : 'tie';
  } else {
    wolfTeamIndices = [wolfIdx, partnerIdx];
    opponentTeamIndices = getOpposingIndices(playerCount, wolfIdx, partnerIdx);
    let wolfComposite = getTeamComposite(wolfTeamIndices, scores);
    let otherComposite = getTeamComposite(opponentTeamIndices, scores);

    if (hasBirdie) {
      const rawDiff = otherComposite.value - wolfComposite.value;
      const wolfBirdie = wolfTeamIndices.some(i => birdies?.[i]);
      const otherBirdie = opponentTeamIndices.some(i => birdies?.[i]);

      if (playerCount === 5) {
        if (rawDiff > 0 && wolfBirdie) {
          otherComposite = { ...otherComposite, value: flipVegas(otherComposite.value) };
          birdieFlipped = true;
          flippedTeam = 'other';
        } else if (rawDiff < 0 && otherBirdie) {
          wolfComposite = { ...wolfComposite, value: flipVegas(wolfComposite.value) };
          birdieFlipped = true;
          flippedTeam = 'wolf';
        }
      } else {
        if (rawDiff > 0) {
          otherComposite = { ...otherComposite, value: flipVegas(otherComposite.value) };
          birdieFlipped = true;
          flippedTeam = 'other';
        } else if (rawDiff < 0) {
          wolfComposite = { ...wolfComposite, value: flipVegas(wolfComposite.value) };
          birdieFlipped = true;
          flippedTeam = 'wolf';
        }
      }
    }

    const diff = otherComposite.value - wolfComposite.value;
    points = Math.abs(diff) * stake;
    if (diff > 0) {
      wolfTeamIndices.forEach(i => { delta[i] += points; });
      const losingShare = wolfTeamIndices.length * points / opponentTeamIndices.length;
      opponentTeamIndices.forEach(i => { delta[i] -= losingShare; });
      baseWinner = 'wolf';
    } else if (diff < 0) {
      opponentTeamIndices.forEach(i => { delta[i] += points; });
      const losingShare = opponentTeamIndices.length * points / wolfTeamIndices.length;
      wolfTeamIndices.forEach(i => { delta[i] -= losingShare; });
      baseWinner = 'other';
    } else {
      baseWinner = 'tie';
    }

    wolfTeamVegas = formatVegas(wolfComposite.value);
    otherTeamVegas = formatVegas(otherComposite.value);
    counted = { wolf: wolfComposite.countedIndices, other: otherComposite.countedIndices };
    ignored = { wolf: wolfComposite.ignoredIndices, other: otherComposite.ignoredIndices };
  }

  const junkEvents = [];
  (birdies || []).forEach((isBirdie, i) => {
    if (isBirdie && normalizedJunk > 0) {
      applyWinnerFromOthers(i, normalizedJunk);
      junkEvents.push(`${playersLabel(i)} birdie`);
    }
  });
  if (greenieIdx != null && normalizedJunk > 0) {
    applyWinnerFromOthers(greenieIdx, normalizedJunk);
    junkEvents.push(`${playersLabel(greenieIdx)} greenie`);
  }
  if (sandyIdx != null && normalizedJunk > 0) {
    applyWinnerFromOthers(sandyIdx, normalizedJunk);
    junkEvents.push(`${playersLabel(sandyIdx)} sandy`);
  }
  if (putt3Idx != null && normalizedJunk > 0) {
    applyLoserToOthers(putt3Idx, normalizedJunk);
    junkEvents.push(`${playersLabel(putt3Idx)} 3-putt penalty`);
  }

  function playersLabel(i) {
    return `P${i + 1}`;
  }

  return {
    delta,
    winner: baseWinner,
    isLoneWolf: !!isLoneWolf,
    wolfTeamVegas,
    otherTeamVegas,
    birdieFlipped,
    flippedTeam,
    hasBirdie,
    usedStake: stake,
    points,
    junkValue: normalizedJunk,
    greenieIdx,
    putt3Idx,
    sandyIdx,
    wolfTeamIndices,
    opponentTeamIndices,
    counted,
    ignored,
    junkEvents,
  };
}

function recomputeTotals(history, playerCount) {
  const totals = EMPTY_TOTALS(playerCount);
  history.forEach(h => {
    const result = calculateHoleResult({
      scores: h.scores,
      wolfIdx: h.wolfIdx,
      partnerIdx: h.partnerIdx,
      isLoneWolf: !!h.isLoneWolf,
      stake: h.stake,
      birdies: h.birdies || EMPTY_BIRDIES(playerCount),
      playerCount,
      junkValue: h.junkValue || 0,
      greenieIdx: h.greenieIdx ?? null,
      putt3Idx: h.putt3Idx ?? null,
      sandyIdx: h.sandyIdx ?? null,
    });
    result.delta.forEach((d, i) => totals[i] += d);
  });
  return totals;
}

function totalsThrough(history, holeLimit, playerCount) {
  const totals = EMPTY_TOTALS(playerCount);
  history.filter(h => h.hole <= holeLimit).forEach(h => {
    (h.delta || EMPTY_TOTALS(playerCount)).forEach((d, i) => totals[i] += d);
  });
  return totals;
}

function usePersistentState(initialState) {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return initialState;
      const parsed = JSON.parse(raw);
      return { ...initialState, ...parsed };
    } catch {
      return initialState;
    }
  });

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch {}
  }, [state]);

  return [state, setState];
}

  const readyToScore = allScoresFilled && stakeReady && junkReady;
  const teamSelected = partnerIdx !== null || isLoneWolf;

  function updateScore(i, value) {
    const next = [...scores];
    next[i] = value;

    const next = [...birdies];
    next[i] = !next[i];

              <div className="matchup-row">

                    <span className="matchup-team wolf-team">🐺 {players[currentWolfIdx]}</span>

                    <button className={`birdie-btn${putt3Idx === i ? ' birdie-on' : ''}`} title="3-putt penalty" onClick={() => setPutt3Idx(putt3Idx === i ? null : i)}>3P</button>

            {result.ignored.other.length > 0 && <div className="vt-label">Ignored: {result.ignored.other.map(i => players[i]).join(', ')}</div>}
          </div>
        </div>
      )}

      <div className="hole-delta-row">
        {players.map((name, i) => (
          <div key={i} className={`delta-cell${result.delta[i] > 0 ? ' pos' : result.delta[i] < 0 ? ' neg' : ' zero'}`}>
            <div className="dc-name">{name}{birdies?.[i] ? ' 🐦' : ''}{result.greenieIdx === i ? ' G' : ''}{result.putt3Idx === i ? ' 3P' : ''}{result.sandyIdx === i ? ' S' : ''}</div>
            <div className="dc-val">{result.delta[i] === 0 ? '—' : `${result.delta[i] > 0 ? '+' : '-'}$${Math.abs(result.delta[i]).toFixed(2)}`}</div>
          </div>
        ))}
      </div>

      <div className="summary-card">
        <div className="section-label">Running Totals</div>
        <div className="totals-list">
          {[...Array(playerCount).keys()].sort((a, b) => totals[b] - totals[a]).map((i, rank) => (
            <div key={i} className={`total-row${rank === 0 ? ' leader' : ''}`}>
              <span className="rank-num">#{rank + 1}</span>
              <span className="total-name">{players[i]}</span>
              <span className={`total-amount${totals[i] >= 0 ? ' pos' : ' neg'}`}>{totals[i] >= 0 ? '+' : ''}${totals[i].toFixed(2)}</span>
            </div>
          ))}
        </div>
      </div>

      <button className="next-hole-btn" onClick={onNext}>{isLast ? 'View Final Scorecard 🏆' : `Hole ${hole + 1} →`}</button>
    </div>
  );
}

function EditListScreen({ holeHistory, players, onSelectHole, onClose }) {
  return (
    <div className="screen">
      <div className="edit-list-header">
        <button className="icon-btn" onClick={onClose}>✕</button>
        <h2 className="edit-list-title">Edit a Hole</h2>
        <div style={{ width: 36 }} />
      </div>
      <div className="edit-hole-list">
        {holeHistory.length === 0 && <div className="empty-edit">No holes completed yet.</div>}
        {holeHistory.map((h, idx) => {
          const birdieNames = (h.birdies || []).map((b, i) => b ? players[i].split(' ')[0] : null).filter(Boolean);
          return (
            <button key={idx} className="edit-hole-row" onClick={() => onSelectHole(idx)}>
              <div className="ehr-hole">
                <span className="ehr-hole-label">HOLE</span>
                <span className="ehr-hole-num">{h.hole}</span>
              </div>
              <div className="ehr-info">
                <div className="ehr-wolf">
                  🐺 {players[h.wolfIdx]}{h.isLoneWolf ? ' ⚡' : h.partnerIdx != null ? ` & ${players[h.partnerIdx]}` : ''}
                  {' '}· stake $${h.stake.toFixed(2)} · junk $${(h.junkValue || 0).toFixed(2)}
                  {birdieNames.length > 0 && <span className="ehr-birdie-badge"> 🐦 {birdieNames.join(', ')}</span>}
                </div>
                <div className="ehr-scores">
                  {players.map((p, i) => (
                    <span key={i} className={`ehr-score-pill${h.birdies?.[i] ? ' birdie-pill' : ''}`}>
                      {h.birdies?.[i] ? '🐦' : ''}{h.greenieIdx === i ? 'G' : ''}{h.putt3Idx === i ? '3P' : ''}{h.sandyIdx === i ? 'S' : ''}{p.split(' ')[0]}: {h.scores[i]}
                    </span>
                  ))}
                </div>
              </div>
              <span className="edit-arrow">✏️</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function SummaryRows({ players, totals }) {
  return (
    <div className="totals-list">
      {[...Array(players.length).keys()].sort((a, b) => totals[b] - totals[a]).map((i, rank) => (
        <div key={i} className={`total-row${rank === 0 ? ' leader' : ''}`}>
          <span className="rank-num">#{rank + 1}</span>
          <span className="total-name">{players[i]}</span>
          <span className={`total-amount${totals[i] >= 0 ? ' pos' : ' neg'}`}>{totals[i] >= 0 ? '+' : ''}${totals[i].toFixed(2)}</span>
        </div>
      ))}
    </div>
  );
}

function grossTotalsFor(history, startHole, endHole, playerCount) {
  const totals = Array(playerCount).fill(0);
  history.filter(h => h.hole >= startHole && h.hole <= endHole).forEach(h => {
    h.scores.forEach((score, i) => totals[i] += score || 0);
  });
  return totals;
}

function GrossScorecardTable({ players, holeHistory, startHole, endHole, title, sectionLabel = 'TOTAL', grandTotals = null }) {
  const holes = [];
  for (let h = startHole; h <= endHole; h += 1) holes.push(h);
  const byHole = Object.fromEntries(holeHistory.map(h => [h.hole, h]));
  const sectionTotals = grossTotalsFor(holeHistory, startHole, endHole, players.length);

  return (
    <div className="golf-scorecard">
      <div className="golf-scorecard-title">{title}</div>
      <table className="golf-scorecard-table">
        <thead>
          <tr>
            <th className="sticky-col">Player</th>
            {holes.map(h => <th key={h}>{h}</th>)}
            <th className="section-total">{sectionLabel}</th>
            {grandTotals && <th className="grand-total">TOT</th>}
          </tr>
        </thead>
        <tbody>
          {players.map((player, playerIdx) => (
            <tr key={player}>
              <td className="sticky-col">{player}</td>
              {holes.map(h => <td key={h}>{byHole[h]?.scores?.[playerIdx] ?? '—'}</td>)}
              <td className="section-total">{sectionTotals[playerIdx] || 0}</td>
              {grandTotals && <td className="grand-total">{grandTotals[playerIdx] || 0}</td>}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ScorecardScreen({ players, holeHistory, totals, totalHoles, mode = 'final', onNewRound, onEditHoles, onExportRound, onContinue }) {
  const playerCount = players.length;
  const grossFront = grossTotalsFor(holeHistory, 1, Math.min(9, totalHoles), playerCount);
  const grossBack = grossTotalsFor(holeHistory, 10, 18, playerCount);
  const grossTotal = grossFront.map((v, i) => v + grossBack[i]);
  const gamblingFront = totalsThrough(holeHistory, 9, playerCount);
  const gamblingFinal = totalHoles >= 18 ? totalsThrough(holeHistory, 18, playerCount) : totals;
  const gamblingBack = gamblingFinal.map((v, i) => v - gamblingFront[i]);
  const displayTotals = mode === 'checkpoint' ? gamblingFront : totals;
  const sorted = [...Array(playerCount).keys()].sort((a, b) => displayTotals[b] - displayTotals[a]);

  return (
    <div className="screen">
      <div className="scorecard-header">
        <div className="trophy">🏆</div>
        <h2>{mode === 'checkpoint' ? 'Front 9 Scorecard' : 'Final Scorecard'}</h2>
      </div>

      <div className="podium">
        {sorted.map((pi, rank) => (
          <div key={pi} className={`podium-card rank-${rank + 1}`}>
            <div className="podium-rank">{rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : `#${rank + 1}`}</div>
            <div className="podium-name">{players[pi]}</div>
            <div className={`podium-total${displayTotals[pi] >= 0 ? ' pos' : ' neg'}`}>{displayTotals[pi] >= 0 ? '+' : ''}${displayTotals[pi].toFixed(2)}</div>
          </div>
        ))}
      </div>

      <div className="golf-scorecard-wrap">
        <GrossScorecardTable
          players={players}
          holeHistory={holeHistory}
          startHole={1}
          endHole={Math.min(9, totalHoles)}
          title="Front 9"
          sectionLabel="OUT"
          grandTotals={mode === 'final' && totalHoles >= 18 ? grossTotal : null}
        />
        {mode === 'final' && totalHoles >= 18 && (
          <GrossScorecardTable
            players={players}
            holeHistory={holeHistory}
            startHole={10}
            endHole={18}
            title="Back 9"
            sectionLabel="IN"
            grandTotals={grossTotal}
          />
        )}
      </div>

      <div className="summary-card" style={{ marginBottom: 18 }}>
        <div className="section-label">Gambling Summary</div>
        <div className="summary-grid">
          <div>
            <div className="subsection-title">Through 9</div>
            <SummaryRows players={players} totals={gamblingFront} />
          </div>
          {mode === 'final' && totalHoles >= 18 ? (
            <>
              <div>
                <div className="subsection-title">Back 9</div>
                <SummaryRows players={players} totals={gamblingBack} />
              </div>
              <div>
                <div className="subsection-title">Through 18</div>
                <SummaryRows players={players} totals={gamblingFinal} />
              </div>
            </>
          ) : (
            <div>
              <div className="subsection-title">Current Total</div>
              <SummaryRows players={players} totals={displayTotals} />
            </div>
          )}
        </div>
      </div>

      <div className="panel" style={{ marginBottom: 18 }}>
        <div className="log-top-row" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <div className="section-label" style={{ margin: 0 }}>Hole by Hole Gambling</div>
          <div className="top-bar-right">
            <button className="edit-log-btn" onClick={onEditHoles}>✏️ Edit a Hole</button>
            <button className="edit-log-btn" onClick={onExportRound}>⤓ Export Round</button>
          </div>
        </div>
        <div className="log-table" style={{ '--player-count': playerCount }}>
          <div className="log-header-row">
            <span>#</span>
            <span>Wolf</span>
            {players.map(p => <span key={p}>{p.split(' ')[0]}</span>)}
          </div>
          {holeHistory.map(h => (
            <div key={h.hole} className="log-data-row">
              <span>{h.hole}</span>
              <span>{players[h.wolfIdx].split(' ')[0]}{h.isLoneWolf ? '⚡' : ''}</span>
              {h.delta.map((d, i) => (
                <span key={i} className={d > 0 ? 'log-pos' : d < 0 ? 'log-neg' : ''}>
                  {d > 0 ? '+' : ''}{d !== 0 ? `$${Math.abs(d).toFixed(0)}` : '—'}
                </span>
              ))}
            </div>
          ))}
          <div className="log-total-row">
            <span>TOT</span><span></span>
            {displayTotals.map((t, i) => (
              <span key={i} className={t >= 0 ? 'log-pos' : 'log-neg'}>{t >= 0 ? '+' : ''}${Math.abs(t).toFixed(2)}</span>
            ))}
          </div>
        </div>
      </div>

      <div className="scorecard-actions">
        {mode === 'checkpoint' ? (
          <>
            <button className="next-hole-btn" onClick={onContinue}>Continue to Back 9 →</button>
            <button className="secondary-btn" onClick={onNewRound}>New Round</button>
          </>
        ) : (
          <button className="new-round-btn" onClick={onNewRound}>New Round</button>
        )}
      </div>
      <div className="footer-note">
        This version is a single shareable HTML file with local browser persistence. Send the file to others and they can run it directly in a browser.
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = usePersistentState(makeInitialState());
  const {
    phase, players, playerCount, totalHoles, defaultStake, defaultJunk, currentHole, totals, holeHistory,
    lastResult, lastScores, lastPartnerIdx, lastIsLoneWolf, lastBirdies, lastWolfIdx, editingHoleIdx, preEditPhase,
  } = state;

  const rotationWolfIdx = (currentHole - 1) % playerCount;
  const editHole = editingHoleIdx != null ? holeHistory[editingHoleIdx] : null;

  function patch(updates) {
    setState(prev => ({ ...prev, ...updates }));
  }

  function startRound({ players, playerCount, defaultStake, totalHoles }) {
    patch({
      phase: 'hole',
      players,
      playerCount,
      totalHoles,
      defaultStake,
      defaultJunk: 0,
      currentHole: 1,
      totals: EMPTY_TOTALS(playerCount),
      holeHistory: [],
      lastResult: null,
      lastScores: null,
      lastPartnerIdx: null,
      lastIsLoneWolf: false,
      lastBirdies: EMPTY_BIRDIES(playerCount),
      lastWolfIdx: null,
      editingHoleIdx: null,
      preEditPhase: null,
    });
  }

  function submitHole({ wolfIdx, scores, partnerIdx, isLoneWolf, birdies, greenieIdx, putt3Idx, sandyIdx, stake, junkValue }) {
    const result = calculateHoleResult({ scores, wolfIdx, partnerIdx, isLoneWolf, stake, birdies, playerCount, junkValue, greenieIdx, putt3Idx, sandyIdx });
    patch({
      phase: 'result',
      defaultStake: stake,
      defaultJunk: junkValue,
      totals: totals.map((t, i) => t + result.delta[i]),
      lastResult: result,
      lastScores: scores,
      lastPartnerIdx: partnerIdx,
      lastIsLoneWolf: isLoneWolf,
      lastBirdies: birdies,
      lastWolfIdx: wolfIdx,
      holeHistory: [...holeHistory, {
        hole: currentHole,
        wolfIdx,
        partnerIdx,
        isLoneWolf,
        scores,
        birdies,
        greenieIdx,
        putt3Idx,
        sandyIdx,
        junkValue,
        stake,
        delta: result.delta,
      }],
    });
  }

  function goNext() {
    if (currentHole >= totalHoles) {
      patch({ phase: 'scorecard' });
    } else if (totalHoles === 18 && currentHole === 9) {
      patch({ phase: 'checkpoint' });
    } else {
      patch({ phase: 'hole', currentHole: currentHole + 1 });
    }
  }

  function continueFromCheckpoint() {
    patch({ phase: 'hole', currentHole: 10 });
  }

  function openEditList() {
    patch({ preEditPhase: phase, phase: 'editList' });
  }

  function selectEditHole(idx) {
    patch({ editingHoleIdx: idx, phase: 'edit' });
  }

  function saveEditedHole({ wolfIdx, scores, partnerIdx, isLoneWolf, birdies, greenieIdx, putt3Idx, sandyIdx, stake, junkValue }) {
    const newHistory = holeHistory.map((item, i) => {
      if (i !== editingHoleIdx) return item;
      const result = calculateHoleResult({ scores, wolfIdx, partnerIdx, isLoneWolf, stake, birdies, playerCount, junkValue, greenieIdx, putt3Idx, sandyIdx });
      return { ...item, wolfIdx, scores, partnerIdx, isLoneWolf, birdies, greenieIdx, putt3Idx, sandyIdx, junkValue, stake, delta: result.delta };
    });

    const newTotals = recomputeTotals(newHistory, playerCount);
    const updates = {
      holeHistory: newHistory,
      totals: newTotals,
      editingHoleIdx: null,
      preEditPhase: null,
      phase: preEditPhase || 'hole',
    };

    if (preEditPhase === 'result' && editingHoleIdx === holeHistory.length - 1) {
      const updated = newHistory[editingHoleIdx];
      const result = calculateHoleResult({
        scores: updated.scores,
        wolfIdx: updated.wolfIdx,
        partnerIdx: updated.partnerIdx,
        isLoneWolf: updated.isLoneWolf,
        stake: updated.stake,
        birdies: updated.birdies,
        playerCount,
        junkValue: updated.junkValue || 0,
        greenieIdx: updated.greenieIdx ?? null,
        putt3Idx: updated.putt3Idx ?? null,
        sandyIdx: updated.sandyIdx ?? null,
      });
      updates.lastResult = result;
      updates.lastScores = updated.scores;
      updates.lastPartnerIdx = updated.partnerIdx;
      updates.lastIsLoneWolf = updated.isLoneWolf;
      updates.lastBirdies = updated.birdies;
      updates.lastWolfIdx = updated.wolfIdx;
      updates.defaultStake = updated.stake;
      updates.defaultJunk = updated.junkValue || 0;
    }

    patch(updates);
  }

  function cancelEdit() {
    patch({ editingHoleIdx: null, phase: preEditPhase || 'hole', preEditPhase: null });
  }

  function resetAll() {
    const fresh = makeInitialState();
    localStorage.removeItem(STORAGE_KEY);
    setState(fresh);
  }

  function exportRound() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `vegas-wolf-round-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  const showFrontNineBanner = totalHoles === 18 && currentHole === 9;

  return (
    <div className="app">
      {phase !== 'setup' && (
        <div className="top-bar">
          <button className="edit-log-btn" onClick={resetAll}>Reset</button>
          <div className="top-bar-right">
            {holeHistory.length > 0 && phase !== 'editList' && phase !== 'edit' && (
              <button className="edit-log-btn" onClick={openEditList}>✏️ Edit Past Hole</button>
            )}
            <button className="edit-log-btn" onClick={exportRound}>⤓ Export</button>
          </div>
        </div>
      )}

      {phase === 'setup' && <SetupScreen onStart={startRound} />}

      {phase === 'hole' && (
        <HoleScreen
          hole={currentHole}
          players={players}
          playerCount={playerCount}
          wolfIdx={rotationWolfIdx}
          totalHoles={totalHoles}
          initialStake={defaultStake}
          initialJunk={defaultJunk}
          onSubmit={submitHole}
        />
      )}

      {phase === 'result' && lastResult && (
        <ResultScreen
          hole={currentHole}
          result={lastResult}
          players={players}
          playerCount={playerCount}
          wolfIdx={lastWolfIdx ?? rotationWolfIdx}
          partnerIdx={lastPartnerIdx}
          isLoneWolf={lastIsLoneWolf}
          scores={lastScores}
          birdies={lastBirdies}
          totals={totals}
          onNext={goNext}
          isLast={currentHole >= totalHoles}
          onEditHoles={openEditList}
          showFrontNineBanner={showFrontNineBanner}
        />
      )}

      {phase === 'editList' && (
        <EditListScreen holeHistory={holeHistory} players={players} onSelectHole={selectEditHole} onClose={cancelEdit} />
      )}

      {phase === 'edit' && editHole && (
        <HoleScreen
          hole={editHole.hole}
          players={players}
          playerCount={playerCount}
          wolfIdx={editHole.wolfIdx}
          totalHoles={totalHoles}
          initialPartner={editHole.partnerIdx}
          initialIsLoneWolf={editHole.isLoneWolf}
          initialScores={editHole.scores}
          initialBirdies={editHole.birdies}
          initialStake={editHole.stake}
          initialJunk={editHole.junkValue || 0}
          initialGreenieIdx={editHole.greenieIdx ?? null}
          initialPutt3Idx={editHole.putt3Idx ?? null}
          initialSandyIdx={editHole.sandyIdx ?? null}
          initialWolfIdx={editHole.wolfIdx}
          isEdit={true}
          onSubmit={saveEditedHole}
          onCancelEdit={cancelEdit}
        />
      )}

      {phase === 'checkpoint' && (
        <ScorecardScreen
          players={players}
          holeHistory={holeHistory}
          totals={totals}
          totalHoles={totalHoles}
          mode="checkpoint"
          onNewRound={resetAll}
          onEditHoles={openEditList}
          onExportRound={exportRound}
          onContinue={continueFromCheckpoint}
        />
      )}

      {phase === 'scorecard' && (
        <ScorecardScreen
          players={players}
          holeHistory={holeHistory}
          totals={totals}
          totalHoles={totalHoles}
          mode="final"
          onNewRound={resetAll}
          onEditHoles={openEditList}
          onExportRound={exportRound}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
